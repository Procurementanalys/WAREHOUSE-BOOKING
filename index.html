<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Booking System - Login & Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1f36 0%, #2d3561 50%, #1a1f36 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 138, 0, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 184, 217, 0.1) 0%, transparent 50%);
            animation: gradientShift 20s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(10%, 10%) rotate(180deg); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.4), 0 0 1px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            max-width: 440px;
            width: 100%;
            animation: slideUp 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #ff8a00 0%, #e52e71 100%);
            padding: 45px 35px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .login-header::before {
            content: '';
            position: absolute;
            font-size: 120px;
            opacity: 0.1;
            top: -20px;
            right: -20px;
            transform: rotate(-15deg);
        }

        /* Logo Alpro */
        .logo-alpro {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .login-header h1 {
            font-size: 30px;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.95;
            position: relative;
            font-weight: 400;
        }

        .tab-container {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }

        .tab-button {
            flex: 1;
            padding: 18px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 3px solid transparent;
            position: relative;
        }

        .tab-button.active {
            color: #ff8a00;
            border-bottom-color: #ff8a00;
            background: white;
        }

        .tab-button:hover:not(.active) {
            color: #495057;
            background: rgba(255, 138, 0, 0.05);
        }

        .login-form {
            padding: 45px 35px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0;
                transform: translateY(10px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: #2d3748;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.2px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafbfc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff8a00;
            box-shadow: 0 0 0 4px rgba(255, 138, 0, 0.1);
            background: white;
        }

        .form-group input::placeholder {
            color: #a0aec0;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ff8a00 0%, #e52e71 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 138, 0, 0.3);
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 138, 0, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 24px;
            font-size: 14px;
            display: none;
            font-weight: 500;
        }

        .alert-error {
            background: #fed7d7;
            color: #c53030;
            border-left: 4px solid #f56565;
        }

        .alert-success {
            background: #c6f6d5;
            color: #2f855a;
            border-left: 4px solid #48bb78;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 16px;
        }

        .loader-spin {
            border: 3px solid rgba(255, 138, 0, 0.2);
            border-top: 3px solid #ff8a00;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .required {
            color: #e52e71;
        }

        @media (max-width: 480px) {
            .login-container {
                border-radius: 16px;
            }
            
            .login-header {
                padding: 35px 25px;
            }
            
            .login-header h1 {
                font-size: 26px;
            }
            
            .login-form {
                padding: 35px 25px;
            }

            .logo-alpro {
                width: 80px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <!-- Logo Alpro -->
            <img src="logo-alpro.png" alt="Alpro Logo" class="logo-alpro">
            <h1>Warehouse Booking</h1>
            <p>Sistem Manajemen Booking Gudang</p>
        </div>
        
        <!-- TAB NAVIGATION -->
        <div class="tab-container">
            <button class="tab-button active" onclick="switchTab('login')">Login</button>
            <button class="tab-button" onclick="switchTab('register')">Daftar Supplier</button>
        </div>
        
        <div class="login-form">
            <div id="alert" class="alert"></div>
            
            <!-- LOGIN FORM -->
            <form id="loginForm" class="form-section active">
                <div class="form-group">
                    <label for="login-username">Username <span class="required">*</span></label>
                    <input type="text" id="login-username" name="username" required placeholder="Masukkan username">
                </div>
                
                <div class="form-group">
                    <label for="login-password">Password <span class="required">*</span></label>
                    <input type="password" id="login-password" name="password" required placeholder="Masukkan password">
                </div>
                
                <button type="submit" class="btn-submit">Login</button>
                
                <div class="loader" id="loader-login">
                    <div class="loader-spin"></div>
                </div>
            </form>

            <!-- REGISTER FORM -->
            <form id="registerForm" class="form-section">
                <div class="form-group">
                    <label for="reg-username">Username <span class="required">*</span></label>
                    <input type="text" id="reg-username" name="username" required placeholder="Pilih username unik">
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Password <span class="required">*</span></label>
                    <input type="password" id="reg-password" name="password" required placeholder="Buat password" minlength="6">
                </div>

                <div class="form-group">
                    <label for="reg-nama-perusahaan">Nama Perusahaan <span class="required">*</span></label>
                    <input type="text" id="reg-nama-perusahaan" name="nama_perusahaan" required placeholder="Nama perusahaan Anda">
                </div>

                <div class="form-group">
                    <label for="reg-email">Email <span class="required">*</span></label>
                    <input type="email" id="reg-email" name="email" required placeholder="email@perusahaan.com">
                </div>
                
                <button type="submit" class="btn-submit">Daftar Sekarang</button>
                
                <div class="loader" id="loader-register">
                    <div class="loader-spin"></div>
                </div>
            </form>
        </div>
    </div>

    <script>
        // ==========================================
        // KONFIGURASI - GANTI DENGAN WEB APP URL ANDA
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbydOXk0JU30N2S4IVY6gWHMwnc7AZmDypKQw_7KtBVqVX3AxAk9dBbk3hvT0EejNTc7lA/exec';

        // ==========================================
        // TAB SWITCHING
        // ==========================================
        function switchTab(tab) {
            // Update tab buttons
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            // Update forms
            document.querySelectorAll('.form-section').forEach(form => {
                form.classList.remove('active');
            });

            if (tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
            }

            // Clear alert
            hideAlert();
        }

        // ==========================================
        // LOGIN HANDLER
        // ==========================================
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            showLoader('login', true);
            hideAlert();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'login',
                        username: username,
                        password: password
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    // Simpan user data di localStorage
                    localStorage.setItem('userData', JSON.stringify(result.data));
                    
                    showAlert('Login berhasil! Redirecting...', 'success');
                    
                    // Redirect berdasarkan role
                    setTimeout(() => {
                        if (result.data.role.toLowerCase() === 'admin') {
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            window.location.href = 'supplier-dashboard.html';
                        }
                    }, 1000);
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
            
            showLoader('login', false);
        });

        // ==========================================
        // REGISTER HANDLER
        // ==========================================
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const namaPerusahaan = document.getElementById('reg-nama-perusahaan').value;
            const email = document.getElementById('reg-email').value;
            
            // Validasi password minimal 6 karakter
            if (password.length < 6) {
                showAlert('Password minimal 6 karakter', 'error');
                return;
            }
            
            showLoader('register', true);
            hideAlert();
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'register',
                        username: username,
                        password: password,
                        nama_perusahaan: namaPerusahaan,
                        email: email
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showAlert(result.message + ' Silakan login.', 'success');
                    
                    // Reset form
                    document.getElementById('registerForm').reset();
                    
                    // Switch ke tab login setelah 2 detik
                    setTimeout(() => {
                        document.querySelector('.tab-button').click();
                    }, 2000);
                } else {
                    showAlert(result.message, 'error');
                }
            } catch (error) {
                showAlert('Error: ' + error.message, 'error');
            }
            
            showLoader('register', false);
        });

        // ==========================================
        // HELPER FUNCTIONS
        // ==========================================
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alert').style.display = 'none';
        }

        function showLoader(formType, show) {
            const loader = document.getElementById('loader-' + formType);
            const btn = document.querySelector(`#${formType}Form .btn-submit`);
            loader.style.display = show ? 'block' : 'none';
            btn.disabled = show;
        }

        // ==========================================
        // CHECK IF ALREADY LOGGED IN
        // ==========================================
        window.addEventListener('DOMContentLoaded', () => {
            const userData = localStorage.getItem('userData');
            if (userData) {
                const user = JSON.parse(userData);
                if (user.role.toLowerCase() === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else {
                    window.location.href = 'supplier-dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
